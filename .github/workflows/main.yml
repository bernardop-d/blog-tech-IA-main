name: Blog IA

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Gerar post
        id: generate
        run: |
          output=$(python post_generator.py)
          echo "$output"
          title=$(echo "$output" | grep "Titulo:" | sed 's/Titulo: //')
          echo "title=$title" >> $GITHUB_OUTPUT

      - name: Commit e push
        run: |
          git config user.name "ia-bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "post: ${{ steps.generate.outputs.title }}"
          git push
