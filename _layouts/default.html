<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% seo %}
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --card-bg: #f9fafb;
      --border: #e5e7eb;
      --tag-bg: #ede9fe;
      --tag-text: #5b21b6;
      --max-width: 820px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .site-brand { display: flex; flex-direction: column; gap: 0.1rem; }
    .site-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .site-title:hover { color: var(--accent); text-decoration: none; }
    .site-desc { font-size: 0.78rem; color: var(--muted); }

    nav { display: flex; align-items: center; gap: 0.25rem; }
    nav a {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: var(--tag-bg); color: var(--accent); text-decoration: none; }

    /* ── Main ── */
    main { padding: 2.5rem 0 3rem; }
    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.75rem;
      letter-spacing: -0.02em;
    }

    /* ── Post list cards ── */
    .post-list { list-style: none; display: flex; flex-direction: column; gap: 0.9rem; }
    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .post-card:hover {
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.08);
      border-color: #c4b5fd;
    }
    .post-card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 0.3rem;
    }
    .post-card-title:hover { color: var(--accent); text-decoration: none; }
    .post-meta { color: var(--muted); font-size: 0.82rem; margin-bottom: 0.5rem; }
    .post-tags-inline { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.45rem; }

    /* ── Article ── */
    article { max-width: var(--max-width); }
    .article-header { margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .article-title {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.03em;
      margin-bottom: 0.6rem;
    }
    .article-meta { color: var(--muted); font-size: 0.875rem; }
    .article-content { font-size: 1.02rem; }
    .article-content p { margin-bottom: 1.1rem; }
    .article-content h2 { font-size: 1.3rem; font-weight: 700; margin: 1.75rem 0 0.75rem; }
    .article-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
    .article-content ul, .article-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .article-content li { margin-bottom: 0.3rem; }
    .article-content code {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .article-content pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .article-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.9rem;
    }
    .article-footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .article-footer-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .article-tags-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    /* ── Tag pills ── */
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .tag:hover { background: #ddd6fe; text-decoration: none; }

    /* ── Tags page ── */
    .tags-grid { display: flex; flex-direction: column; gap: 2rem; }
    .tag-section {}
    .tag-section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--tag-bg);
    }
    .tag-section-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }
    .tag-count {
      font-size: 0.78rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .tag-section ul { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
    .tag-section li { font-size: 0.95rem; }
    .tag-section li a { color: var(--text); }
    .tag-section li a:hover { color: var(--accent); }
    .tag-section li::before { content: "→ "; color: var(--muted); font-size: 0.85rem; }
    .post-date-small { color: #9ca3af; font-size: 0.8rem; margin-left: 0.4rem; }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
    }
    footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .footer-text { color: var(--muted); font-size: 0.82rem; }
    .footer-badge {
      font-size: 0.75rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .article-title { font-size: 1.5rem; }
      .page-title { font-size: 1.35rem; }
      nav a { padding: 0.3rem 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="site-brand">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <span class="site-desc">{{ site.description }}</span>
      </div>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/tags.html' | relative_url }}">Tags</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <span class="footer-text">© {{ site.time | date: "%Y" }} {{ site.title }}</span>
      <span class="footer-badge">⚡ Gerado automaticamente com Python + Jekyll</span>
    </div>
  </footer>
</body>
</html>
